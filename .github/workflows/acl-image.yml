# Build and publish the `acl` CLI as a multi-arch container image to
# ghcr.io. Triggered on tags `acl-v*` and on dispatch.
#
# The image is signed with cosign keyless (Sigstore) so users can
# verify provenance. SBOM and provenance attestations are generated
# by buildx.

name: acl-image

on:
  push:
    tags: ["acl-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to 'dev')"
        required: false
        default: "dev"

permissions:
  contents: read
  packages: write
  id-token: write   # required for cosign keyless

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF#refs/tags/acl-}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Building ghcr.io/${{ github.repository_owner }}/acl:$tag"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.acl
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/acl:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/acl:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/acl@${{ steps.build.outputs.digest }}
