# Release the `acl` CLI as cross-platform binaries on tag `acl-v*`.
#
# Runs goreleaser to build static binaries for darwin/linux × amd64/arm64,
# generates SHA256 checksums, signs them with cosign keyless (Sigstore),
# and publishes a GitHub Release with the artifacts.
#
# The container image release lives in acl-image.yml (same tag trigger,
# different jobs).

name: acl-release

on:
  push:
    tags: ["acl-v*"]
  workflow_dispatch:

permissions:
  contents: write       # needed to create the GitHub Release
  id-token: write       # required for cosign keyless signing

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
