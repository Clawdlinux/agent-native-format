name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-and-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate docs
        run: python3 scripts/check_docs.py
      - name: Go test
        run: go test ./...
