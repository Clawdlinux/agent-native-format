name: paper

on:
  pull_request:
    paths:
      - paper/**
      - benchmark/charts.py
      - results/**
      - scripts/check_paper.py
      - .github/workflows/paper.yml
  push:
    branches: [main]
    paths:
      - paper/**
      - benchmark/charts.py
      - results/**
      - scripts/check_paper.py
      - .github/workflows/paper.yml

jobs:
  charts-renderable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install matplotlib
        run: python -m pip install -q --upgrade pip matplotlib
      - name: regenerate charts from committed results
        run: |
          python3 benchmark/charts.py \
            --in results/2026-05-02-week3-baseline.json \
            --out-dir /tmp/charts
      - name: confirm 6 chart files exist (3 svg + 3 png)
        # Matplotlib's SVG output isn't byte-stable across font/version
        # combos, so we don't compare bytes. Instead we assert the
        # paper/figures/ committed artifacts exist alongside the
        # regenerated set, and that both sets contain the expected six
        # files. The pdf job below builds the actual paper from the
        # committed figures, which is the real proof they are usable.
        run: |
          for dir in /tmp/charts paper/figures; do
            for name in tokens round_trips reduction; do
              for ext in svg png; do
                if [ ! -s "$dir/$name.$ext" ]; then
                  echo "::error::missing or empty $dir/$name.$ext"
                  exit 1
                fi
              done
            done
          done
          echo "all 6 chart files present in both /tmp/charts and paper/figures"

  numbers-match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: paper sanity check
        run: python3 scripts/check_paper.py

  pdf:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v4
      - name: build acp.pdf
        run: make -C paper pdf
      - uses: actions/upload-artifact@v4
        with:
          name: acp-pdf
          path: paper/acp.pdf
          if-no-files-found: error
