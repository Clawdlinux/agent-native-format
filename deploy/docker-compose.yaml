services:
  acp-server:
    image: busybox:1.36
    command: ["sh", "-c", "echo 'ACP server implementation lands in Week 1' && tail -f /dev/null"]
    environment:
      ACP_ADDR: ":8080"
    ports:
      - "8080:8080"
    profiles: ["week1"]

  db-proxy:
    image: ghcr.io/ninevigil/mock-tool:dev
    profiles: ["future"]

  template-svc:
    image: ghcr.io/ninevigil/mock-tool:dev
    profiles: ["future"]

  email-gw:
    image: ghcr.io/ninevigil/mock-tool:dev
    profiles: ["future"]
